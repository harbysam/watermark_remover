{% load static %}
<!DOCTYPE html>
<html lang="tr" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Local watermark remover — brush, apply, download. No AI, no upload to cloud.">
    <title>{% block title %}WM Remover{% endblock %}</title>
    <script>
        (function () {
            const theme = localStorage.getItem('wm-theme') || 'light';
            document.documentElement.setAttribute('data-bs-theme', theme);
        })();
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body class="d-flex flex-column min-vh-100 bg-body-tertiary">
    <nav class="navbar navbar-expand-lg border-bottom bg-body shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-semibold" href="/">
                <i class="bi bi-brush text-primary me-2"></i>WM Remover
            </a>
            <div class="d-flex align-items-center gap-2 ms-auto">
                <span class="badge text-bg-secondary d-none d-sm-inline">Local · OpenCV · No AI</span>
                <button type="button" class="btn btn-outline-secondary btn-sm" id="themeToggle" aria-label="Karanlik mod" title="Karanlik mod">
                    <i class="bi bi-moon-stars-fill" id="themeToggleIcon"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="container py-4 py-lg-5 flex-grow-1">
        {% block content %}{% endblock %}
    </main>

    <footer class="border-top bg-body py-3 mt-auto">
        <div class="container text-center text-muted small">
            Runs locally on your machine. Unbrushed pixels stay untouched.
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/theme.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
